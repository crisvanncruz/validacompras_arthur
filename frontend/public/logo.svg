<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>

    <linearGradient id="leftLegGrad" x1="0%" y1="100%" x2="100%">
      <stop offset="0%" stop-color="#1E40AF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <linearGradient id="rightLegGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#0E7490" />
    </linearGradient>

    <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <g transform="translate(0, -10)">

    <path
      d="M 250 80
         L 120 360
         L 175 360
         L 250 200 Z"
      fill="url(#leftLegGrad)"
    />

    <path
      d="M 250 80
         L 250 200
         L 325 360
         L 380 360 Z"
      fill="url(#rightLegGrad)"
    />

    <path
      d="M 160 280
         L 225 325
         L 400 150
         L 365 115
         L 225 265
         L 190 240 Z"
      fill="url(#checkGrad)"
      filter="url(#dropShadow)"
    />

    <circle cx="250" cy="80" r="8" fill="#38BDF8" />
  </g>

  <text
    x="250"
    y="440"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="34"
    letter-spacing="0.25em"
    fill="#1E293B"
  >
    ARTHUR
  </text>

  <text
    x="250"
    y="470"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-weight="600"
    font-size="12"
    letter-spacing="0.4em"
    fill="#64748B"
  >
    COMPLIANCE AGENT
  </text>
</svg>